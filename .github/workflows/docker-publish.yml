name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: dockerhub_gate
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ steps.dockerhub_gate.outputs.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for GHCR
        id: meta_ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/congyoubanmian/novel-report-scanner
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Docker metadata for Docker Hub
        id: meta_dockerhub
        if: ${{ steps.dockerhub_gate.outputs.enabled == 'true' }}
        uses: docker/metadata-action@v5
        with:
          images: congyoubanmian/novel-report-scanner
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build timestamp
        id: build_time
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker build arguments
        env:
          GHCR_TAGS: ${{ steps.meta_ghcr.outputs.tags }}
          GHCR_LABELS: ${{ steps.meta_ghcr.outputs.labels }}
          DOCKERHUB_TAGS: ${{ steps.meta_dockerhub.outputs.tags }}
          DOCKERHUB_LABELS: ${{ steps.meta_dockerhub.outputs.labels }}
          DOCKERHUB_ENABLED: ${{ steps.dockerhub_gate.outputs.enabled }}
        run: |
          : > /tmp/docker-tags.list
          : > /tmp/docker-labels.args

          printf '%s\n' "$GHCR_TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] && printf '%s\n' "$tag" >> /tmp/docker-tags.list
          done
          printf '%s\n' "$GHCR_LABELS" | while IFS= read -r label; do
            [ -n "$label" ] && printf -- '--label=%s\n' "$label" >> /tmp/docker-labels.args
          done

          if [ "$DOCKERHUB_ENABLED" = "true" ]; then
            printf '%s\n' "$DOCKERHUB_TAGS" | while IFS= read -r tag; do
              [ -n "$tag" ] && printf '%s\n' "$tag" >> /tmp/docker-tags.list
            done
            printf '%s\n' "$DOCKERHUB_LABELS" | while IFS= read -r label; do
              [ -n "$label" ] && printf -- '--label=%s\n' "$label" >> /tmp/docker-labels.args
            done
          fi

      - name: Build Docker image
        run: |
          mapfile -t label_args < /tmp/docker-labels.args
          docker buildx build \
            --load \
            --file Dockerfile \
            --tag "novel-report-scanner:${{ github.sha }}" \
            --build-arg APP_VERSION="${{ github.ref_name }}" \
            --build-arg APP_COMMIT="${{ github.sha }}" \
            --build-arg APP_BUILD_DATE="${{ steps.build_time.outputs.value }}" \
            "${label_args[@]}" \
            .

      - name: Push Docker image tags with retry
        run: |
          : > /tmp/docker-push-failures.list

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker tag "novel-report-scanner:${{ github.sha }}" "$tag"

            pushed=false
            for attempt in 1 2 3 4; do
              if docker push "$tag"; then
                pushed=true
                break
              fi
              if [ "$attempt" -eq 4 ]; then
                printf '%s\n' "$tag" >> /tmp/docker-push-failures.list
                break
              fi
              sleep_seconds=$((attempt * 30))
              echo "Docker push failed for ${tag}, retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            done

            if [ "$pushed" != "true" ]; then
              echo "Docker push failed for ${tag} after all retry attempts; continuing with remaining tags."
            fi
          done < /tmp/docker-tags.list

          if [ -s /tmp/docker-push-failures.list ]; then
            echo "::error::Failed to push these image tags:"
            cat /tmp/docker-push-failures.list
            exit 1
          fi

      - name: Report Docker Hub push
        if: ${{ steps.dockerhub_gate.outputs.enabled == 'true' }}
        run: echo "Docker Hub credentials detected; image tags were pushed together with GHCR."

services:
  novel-report-scanner:
    image: ${NOVEL_REPORT_SCANNER_IMAGE:-novel-report-scanner:latest}
    container_name: novel-report-scanner
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    mem_limit: ${CONTAINER_MEMORY_LIMIT:-2g}
    mem_reservation: ${CONTAINER_MEMORY_RESERVATION:-512m}
    ports:
      - "${WEB_PORT:-8765}:8765"
    environment:
      WEB_HOST: 0.0.0.0
      WEB_PORT: 8765
      WEB_ACCESS_TOKEN: ${WEB_ACCESS_TOKEN:-}
      NOVEL_REPORT_SCANNER_REQUIRE_API_KEY: ${NOVEL_REPORT_SCANNER_REQUIRE_API_KEY:-1}
      BASE_URL: ${BASE_URL:-https://api.deepseek.com}
      MODEL_NAME: ${MODEL_NAME:-deepseek-chat}
      API_KEY: ${API_KEY:-}
      API_KEY_POOL: ${API_KEY_POOL:-}
      ANALYSIS_PROFILE: ${ANALYSIS_PROFILE:-harem}
      MAX_WORKERS: ${MAX_WORKERS:-2}
      RPM_LIMIT: ${RPM_LIMIT:-100}
      TPM_LIMIT: ${TPM_LIMIT:-10000000}
      RATE_LIMIT_SCOPE: ${RATE_LIMIT_SCOPE:-auto}
      DIM_BOOST_MAX_PER_CHUNK: ${DIM_BOOST_MAX_PER_CHUNK:-3}
      RESCAN_ROUNDS: ${RESCAN_ROUNDS:-3}
      MAX_MIDDLE_SUMMARY_CALLS: ${MAX_MIDDLE_SUMMARY_CALLS:-10}
      INITIAL_SCAN_BLOCK_MULTIPLIER: ${INITIAL_SCAN_BLOCK_MULTIPLIER:-3}
      INITIAL_SCAN_MIN_BLOCK_SIZE: ${INITIAL_SCAN_MIN_BLOCK_SIZE:-6}
      RESCAN_MAX_HITS: ${RESCAN_MAX_HITS:-4}
      RESCAN_PRE_FILTER_THRESHOLD: ${RESCAN_PRE_FILTER_THRESHOLD:-1.0}
      RESCAN_MAX_WINDOW: ${RESCAN_MAX_WINDOW:-2000}
      RESCAN_MAX_PROMPT_HEROINES: ${RESCAN_MAX_PROMPT_HEROINES:-4}
      GENERAL_SCAN_MAX_CHUNKS: ${GENERAL_SCAN_MAX_CHUNKS:-80}
      GENERAL_SCAN_SMART_DENSITY: ${GENERAL_SCAN_SMART_DENSITY:-1}
      GENERAL_SCAN_CONTENT_AWARE_SAMPLING: ${GENERAL_SCAN_CONTENT_AWARE_SAMPLING:-1}
      GENERAL_SCAN_INCREMENTAL_REUSE: ${GENERAL_SCAN_INCREMENTAL_REUSE:-1}
      GENERAL_SCAN_WRITING_QUALITY: ${GENERAL_SCAN_WRITING_QUALITY:-1}
      GENERAL_SCAN_NARRATIVE_ARCHITECTURE: ${GENERAL_SCAN_NARRATIVE_ARCHITECTURE:-1}
      GENERAL_SCAN_FORESHADOWING_ENGINEERING: ${GENERAL_SCAN_FORESHADOWING_ENGINEERING:-1}
      GENERAL_SCAN_SEMANTIC_LAYERS: ${GENERAL_SCAN_SEMANTIC_LAYERS:-1}
      GENERAL_SCAN_READER_EXPERIENCE: ${GENERAL_SCAN_READER_EXPERIENCE:-1}
      GENERAL_SCAN_CONTINUITY_AUDIT: ${GENERAL_SCAN_CONTINUITY_AUDIT:-1}
      GENERAL_SCAN_ROLLING_CONTEXT: ${GENERAL_SCAN_ROLLING_CONTEXT:-1}
      GENERAL_SCAN_KNOWLEDGE_BASE_LLM_MERGE: ${GENERAL_SCAN_KNOWLEDGE_BASE_LLM_MERGE:-0}
      GENERAL_SCAN_CONTEXT_MAX_CHARS: ${GENERAL_SCAN_CONTEXT_MAX_CHARS:-1600}
      HAREM_PLUS_GENERAL_SCAN: ${HAREM_PLUS_GENERAL_SCAN:-0}
      WEB_CORS_ALLOW_ORIGIN: ${WEB_CORS_ALLOW_ORIGIN:-*}
      WEB_REQUEST_TIMEOUT: ${WEB_REQUEST_TIMEOUT:-60}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-104857600}
      MAX_JSON_BODY_SIZE: ${MAX_JSON_BODY_SIZE:-65536}
      FILE_RESPONSE_CHUNK_SIZE: ${FILE_RESPONSE_CHUNK_SIZE:-1048576}
      SYNC_BOOKS_TTL_SECONDS: ${SYNC_BOOKS_TTL_SECONDS:-5}
      OUTPUTS_CACHE_TTL_SECONDS: ${OUTPUTS_CACHE_TTL_SECONDS:-5}
      SSE_STATE_INTERVAL_SECONDS: ${SSE_STATE_INTERVAL_SECONDS:-3}
      SSE_SYNC_INTERVAL_SECONDS: ${SSE_SYNC_INTERVAL_SECONDS:-5}
      SSE_MAX_CONNECTION_SECONDS: ${SSE_MAX_CONNECTION_SECONDS:-300}
    volumes:
      - ./novels:/app/novels
      - ./results:/app/results
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY_LIMIT:-2G}
        reservations:
          memory: ${CONTAINER_MEMORY_RESERVATION:-512M}
